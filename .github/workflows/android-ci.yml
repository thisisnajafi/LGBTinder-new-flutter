# LGBTFinder Flutter — Android CI/CD
#
# Pipeline: analyze → test → build APK/AAB → emulator compatibility matrix → Telegram report
# Optional secrets (override hardcoded defaults): TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
# Release signing (optional): ANDROID_KEYSTORE_BASE64, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD, ANDROID_STORE_PASSWORD

name: LGBTFinder Android CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: lgbtfinder-flutter-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.0"
  JAVA_VERSION: "17"
  ANDROID_SDK_CONFIG: "compileSdk=36, targetSdk=36, minSdk=24, NDK=28.2.13676358"

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      analyze_status: ${{ steps.analyze.outcome }}
      test_status: ${{ steps.test.outcome }}
      test_summary: ${{ steps.test_summary.outputs.summary }}
      flutter_version: ${{ steps.flutter_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Record Flutter version
        id: flutter_version
        run: echo "version=$(flutter --version | head -n 1)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        id: analyze
        continue-on-error: true
        run: flutter analyze lib/ --no-fatal-infos --no-fatal-warnings

      - name: Unit tests
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          flutter test test/unit/ 2>&1 | tee test-output.log
          exit ${PIPESTATUS[0]}

      - name: Summarize test results
        id: test_summary
        if: always()
        run: |
          if [[ -f test-output.log ]]; then
            SUMMARY=$(tail -n 5 test-output.log | tr '\n' ' ')
          else
            SUMMARY="No test output"
          fi
          echo "summary=${SUMMARY}" >> "$GITHUB_OUTPUT"

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.log
          if-no-files-found: ignore

  build-android:
    name: Build APK & App Bundle
    runs-on: ubuntu-latest
    needs: analyze-and-test
    timeout-minutes: 45
    outputs:
      apk_status: ${{ steps.build_apk.outcome }}
      aab_status: ${{ steps.build_aab.outcome }}
      build_duration: ${{ steps.build_timer.outputs.duration }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [[ -z "$ANDROID_KEYSTORE_BASE64" ]]; then
            echo "No release keystore secret; CI will use debug signing."
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${ANDROID_STORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=upload-keystore.jks
          EOF

      - name: Build split release APKs
        id: build_apk
        run: |
          START=$(date +%s)
          echo "start=${START}" >> "$GITHUB_ENV"
          flutter build apk --release --split-per-abi

      - name: Build release App Bundle
        id: build_aab
        run: flutter build appbundle --release

      - name: Record build duration
        id: build_timer
        if: always()
        run: |
          END=$(date +%s)
          START="${{ env.start }}"
          echo "duration=$((END - START))s" >> "$GITHUB_OUTPUT"

      - name: Collect release artifacts
        run: |
          mkdir -p build/releases/apk build/releases/aab
          cp -v build/app/outputs/flutter-apk/app-*-release.apk build/releases/apk/ || true
          cp -v build/app/outputs/bundle/release/app-release.aab build/releases/aab/
          ls -lhR build/releases/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/releases/apk/*.apk
          retention-days: 14

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-app-bundle
          path: build/releases/aab/app-release.aab
          retention-days: 14

      - name: Upload build summary
        uses: actions/upload-artifact@v4
        with:
          name: build-releases
          path: build/releases/
          retention-days: 14

  compatibility-matrix:
    name: API ${{ matrix.api-level }} (${{ matrix.android_version }})
    runs-on: ubuntu-latest
    needs: build-android
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - api-level: 26
            android_version: "Android 8.0"
          - api-level: 28
            android_version: "Android 9"
          - api-level: 29
            android_version: "Android 10"
          - api-level: 30
            android_version: "Android 11"
          - api-level: 31
            android_version: "Android 12"
          - api-level: 33
            android_version: "Android 13"
          - api-level: 34
            android_version: "Android 14"
          - api-level: 35
            android_version: "Android 15"

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apks
          path: apks/

      - name: Run on emulator (API ${{ matrix.api-level }})
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            echo "Testing on ${{ matrix.android_version }} (API ${{ matrix.api-level }})"
            APK="apks/app-x86_64-release.apk"
            if [[ ! -f "$APK" ]]; then
              APK=$(ls apks/app-*-release.apk | head -n 1)
            fi
            echo "Installing: $APK"
            adb wait-for-device
            adb install -r "$APK"
            adb shell pm list packages | grep com.lgbtfinder
            adb shell monkey -p com.lgbtfinder -c android.intent.category.LAUNCHER 1
            sleep 5
            adb shell dumpsys activity activities | grep -E "mResumedActivity|com.lgbtfinder" || true
            echo "PASS: API ${{ matrix.api-level }}"

  notify-telegram:
    name: Telegram Build Report
    runs-on: ubuntu-latest
    needs: [analyze-and-test, build-android, compatibility-matrix]
    if: always()
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine overall status
        id: status
        run: |
          ANALYZE="${{ needs.analyze-and-test.outputs.analyze_status }}"
          BUILD_APK="${{ needs.build-android.outputs.apk_status }}"
          BUILD_AAB="${{ needs.build-android.outputs.aab_status }}"
          COMPAT="${{ needs.compatibility-matrix.result }}"

          if [[ "$BUILD_APK" == "success" && "$BUILD_AAB" == "success" && "$COMPAT" == "success" ]]; then
            echo "overall=success" >> "$GITHUB_OUTPUT"
            echo "errors=none" >> "$GITHUB_OUTPUT"
          else
            echo "overall=failure" >> "$GITHUB_OUTPUT"
            ERRORS=""
            [[ "$ANALYZE" != "success" ]] && ERRORS="${ERRORS}analyze "
            [[ "$BUILD_APK" != "success" ]] && ERRORS="${ERRORS}apk "
            [[ "$BUILD_AAB" != "success" ]] && ERRORS="${ERRORS}aab "
            [[ "$COMPAT" != "success" ]] && ERRORS="${ERRORS}compatibility "
            echo "errors=${ERRORS:-unknown failure}" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Telegram report
        env:
          BUILD_STATUS: ${{ steps.status.outputs.overall }}
          PROJECT_NAME: LGBTFinder Flutter
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_AUTHOR: ${{ github.actor }}
          BUILD_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
          FLUTTER_VERSION: ${{ needs.analyze-and-test.outputs.flutter_version }}
          ANDROID_SDK_CONFIG: ${{ env.ANDROID_SDK_CONFIG }}
          BUILD_DURATION: ${{ needs.build-android.outputs.build_duration }}
          TEST_RESULTS: "analyze=${{ needs.analyze-and-test.outputs.analyze_status }}, tests=${{ needs.analyze-and-test.outputs.test_status }} — ${{ needs.analyze-and-test.outputs.test_summary }}"
          APK_STATUS: ${{ needs.build-android.outputs.apk_status }}
          AAB_STATUS: ${{ needs.build-android.outputs.aab_status }}
          COMPAT_STATUS: ${{ needs.compatibility-matrix.result }} (API 26–35 matrix)
          ARTIFACT_LINKS: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ERROR_SUMMARY: ${{ steps.status.outputs.errors }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/ci_telegram_report.sh
          scripts/ci_telegram_report.sh
